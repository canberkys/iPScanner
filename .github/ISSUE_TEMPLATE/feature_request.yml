name: Feature request
description: Suggest an enhancement or a missing capability.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Sketch it here. The roadmap in the README has the rough order; new ideas can shift the priorities.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation you're stuck in today, not the proposed solution.
      placeholder: |
        I run iPScanner on multiple VLANs and have to retype the CIDR each time...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: How would the feature work in your head? UI sketches, keyboard shortcuts, screenshots welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, similar features in other tools (Advanced IP Scanner, Angry IP Scanner, Lansweeper, etc.).
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this for you?
      options:
        - Nice to have
        - Would use often
        - Blocking — I can't use iPScanner without it
    validations:
      required: false
